name: frozen-runtime-smoke

on:
  workflow_dispatch:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  windows-frozen-smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --clean Surprize.spec

      - name: Run frozen runtime smoke
        shell: pwsh
        run: |
          .\dist\Surprize\Surprize.exe --frozen-runtime-smoke

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frozen-runtime-smoke-artifacts
          path: |
            dist\Surprize\outputs\smoke\frozen_runtime
            outputs\smoke\frozen_runtime

