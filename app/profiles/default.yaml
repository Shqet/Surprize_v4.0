default:
  orchestrator:
    stop_timeout_sec: 10

  services:
    exe_runner:
      path: "cmd"
      args: "/c ping 127.0.0.1 -n 5"
      timeout_sec: 10

    ballistics_model:
      model_root: "model_ballistics"
      python_exe: "python"
      calc_entry: "run_vkr.py"
      plots_entry: "visualization.py"
      out_root: "outputs"
      timeout_sec: 120
      make_plots: true

      # Будет сериализовано в run_dir/vkr_config.json (как есть)
      config_json:
        simulation:
          dt: 0.002
          t_max: 120.0
          max_steps: 2000000

        projectile:
          m: 10.0
          S: 0.01
          C_L: 0.0
          C_mp: 0.0
          g: 9.81

        rotation:
          Ix: 0.02
          Iy: 0.10
          Iz: 0.10
          k_stab: 1.0

        initial_conditions:
          V0: 310.0
          theta_deg: 15.0
          psi_deg: 0.0
          X0: 0.0
          Y0: 0.0
          Z0: 1.0
          omega_body: [ 0.0, 0.0, 100.0 ]

    rtsp_health:
      channels:
        visible:
          url: "rtsp://192.168.0.10:8554/visible"
        thermal:
          url: "rtsp://192.168.0.10:8554/thermal"
      probe_timeout_sec: 3
      period_ok_sec: 2
      backoff:
        base_ms: 300
        max_ms: 5000
        jitter_ms: 200
